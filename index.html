<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        // Apply settings immediately to avoid a flash of unstyled content.
        // Reads font scale from arcade.v1.global.fontScale (the canonical key
        // shared with games via the SDK); falls back to the legacy 'fontScale'
        // key for users who set their preference before the migration.
        (function() {
            let scaleStr = '1';
            const newRaw = localStorage.getItem('arcade.v1.global.fontScale');
            if (newRaw !== null) {
                try {
                    const n = JSON.parse(newRaw);
                    if (typeof n === 'number' && isFinite(n)) scaleStr = String(n);
                } catch (e) {}
            } else {
                scaleStr = localStorage.getItem('fontScale') || '1';
            }
            document.documentElement.style.setProperty('--font-scale', scaleStr);
            document.documentElement.setAttribute('data-theme', 'launcher');
            document.documentElement.classList.add('mode-launcher');
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paul's Arcade</title>
    <meta name="description" content="Paul's Arcade — browser games by Paul Gibeault. Moon Lit, Silicon Syndicate, HecknSic, Cozy Solitaire, Pi Game. No installs, no signups, plays in your browser.">
    <meta name="author" content="Paul Gibeault">
    <meta property="og:title" content="Paul's Arcade">
    <meta property="og:description" content="Browser games by Paul Gibeault. No installs, no signups, plays in your browser.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://paulgibeault.github.io/">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Paul's Arcade">
    <link rel="shortcut icon" href="images/icon-192.png" type="image/png">
    <link rel="icon" href="images/icon-192.png" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="images/icon-192.png">

    <link rel="stylesheet" href="styles.css">
    <style>
        /* ========================================
           LAUNCHER PAGE — page-specific styles
           ======================================== */

        /* ---- LAUNCHER HEADER ---- */
        .launcher-header {
            text-align: center;
            padding: 60px 24px 20px;
        }

        .launcher-header__title {
            font-family: var(--font-display);
            font-weight: 900;
            font-size: clamp(2rem, 6vw, 3.5rem);
            letter-spacing: 4px;
            color: var(--snow-white);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .launcher-header__title span {
            color: var(--field-gold);
        }

        /* ---- LAUNCHER GRID ---- */
        #view-launcher {
            padding: 0 40px 80px;
            min-height: calc(100vh - 200px);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .launcher-grid {
            display: grid;
            /* rem-based so columns reflow at high font-scale instead of clipping. */
            grid-template-columns: repeat(auto-fit, minmax(10rem, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 62.5rem;
            margin: 0 auto;
        }

        .launcher-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            overflow: hidden;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        box-shadow 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        border-color 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            opacity: 0;
            animation: launcher-fade-in 0.6s ease forwards;
        }

        .launcher-btn:hover {
            transform: translateY(-6px);
            border-color: var(--field-gold);
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.4),
                0 0 30px var(--field-gold-dim);
        }

        .launcher-btn__image-wrap {
            overflow: hidden;
            width: 100%;
            aspect-ratio: 16 / 10;
            border-bottom: 1px solid var(--card-border);
            flex-shrink: 0;
        }

        .launcher-btn__image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .launcher-btn:hover .launcher-btn__image {
            transform: scale(1.05);
        }

        .launcher-btn__body {
            padding: 14px;
            text-align: center;
            background: rgba(10, 10, 20, 0.4);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .launcher-btn__name {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1rem;
            color: var(--snow-white);
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .launcher-btn__subtitle {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--field-gold);
            letter-spacing: 1px;
        }

        @keyframes launcher-fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .launcher-header { padding: 40px 16px 16px; }
            .launcher-grid {
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 16px;
            }
            #view-launcher {
                padding: 0 16px 40px;
            }
            .launcher-btn__name { font-size: 0.95rem; }
            .launcher-btn__subtitle { font-size: 0.6rem; }
        }

        @media (max-width: 480px) {
            .launcher-header { padding: 28px 16px 12px; }
            .launcher-header__title { letter-spacing: 2px; }
            .launcher-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            #view-launcher {
                padding: 0 16px 24px;
            }
            .launcher-btn {
                flex-direction: row;
                align-items: center;
                text-align: left;
            }
            .launcher-btn__image-wrap {
                width: 80px;
                aspect-ratio: 1 / 1;
                border-bottom: none;
                border-right: 1px solid var(--card-border);
            }
            .launcher-btn__body {
                padding: 12px 16px;
                align-items: flex-start;
            }
            .launcher-btn__name { font-size: 1rem; margin-bottom: 2px; }
            .launcher-btn__subtitle { font-size: 0.7rem; }
        }

        /* ---- GAME VIEW (fullscreen iframe overlay) ---- */
        #view-game {
            width: 100%; height: 100vh;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 3000; background: #000;
            display: flex; flex-direction: column;
        }
        #view-game.hidden { display: none !important; }
        #iframe-host {
            flex-grow: 1; position: relative; width: 100%; background: #000;
        }
        #iframe-host iframe {
            position: absolute; inset: 0;
            width: 100%; height: 100%; border: none; background: #000;
        }
        #iframe-host iframe[hidden] { display: none !important; }
        /* Loading veil + error card over the game frame (below the 40px topbar). */
        .game-overlay {
            position: absolute; top: 40px; left: 0; right: 0; bottom: 0;
            z-index: 3001; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 14px; padding: 24px; text-align: center; color: #ddd;
        }
        .game-overlay.hidden { display: none !important; }
        .game-overlay__spinner {
            width: 34px; height: 34px; border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.18);
            border-top-color: var(--field-gold, #e6c15a);
            animation: game-spin 0.9s linear infinite;
        }
        @keyframes game-spin { to { transform: rotate(360deg); } }
        @media (prefers-reduced-motion: reduce) {
            .game-overlay__spinner { animation-duration: 2.4s; }
        }
        .game-overlay__msg { font-size: 1rem; margin: 0; }
        .game-overlay__sub { font-size: 0.85rem; color: #999; margin: 0; max-width: 32ch; }
        .game-overlay__actions { display: flex; gap: 10px; margin-top: 6px; }
        .game-overlay__btn { padding: 8px 16px; }
        .game-topbar {
            width: 100%; height: 40px; background: rgba(10, 10, 25, 0.85);
            border-bottom: 1px solid var(--field-gold); display: flex;
            align-items: center; justify-content: space-between; padding: 0 16px;
            box-sizing: border-box; flex-shrink: 0; z-index: 3001;
        }
        .game-topbar__title {
            font-family: var(--font-display); color: var(--field-gold);
            font-size: 1rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0.8;
            margin: 0; padding: 0;
        }
        .game-topbar__actions {
            display: flex; align-items: center; gap: 8px;
        }
        .topbar-btn {
            background: rgba(0, 0, 0, 0.5); border: 1px solid var(--field-gold);
            color: var(--snow-white); padding: 4px 10px; border-radius: 4px;
            font-family: var(--font-display); font-size: 0.8rem; cursor: pointer;
            transition: all 0.2s ease; display: flex; align-items: center; justify-content: center;
        }
        .topbar-btn:hover,
        .topbar-btn[aria-expanded="true"] {
            background: var(--field-gold); color: #000;
        }
        .topbar-btn__icon { font-size: 1rem; line-height: 1; }
        .quit-btn {
            background: rgba(0, 0, 0, 0.5); border: 1px solid var(--field-gold);
            color: var(--snow-white); padding: 4px 10px; border-radius: 4px;
            font-family: var(--font-display); font-size: 0.8rem; cursor: pointer;
            transition: all 0.2s ease; display: flex; align-items: center; justify-content: center;
        }
        .quit-btn:hover {
            background: var(--field-gold); color: #000;
        }
        .quit-btn__icon { font-size: 1rem; line-height: 1; margin-top: 1px; }
    </style>
</head>

<!-- ========== MULTIPLAYER DIALOG ========== -->

     and the full-featured saved-connections manager. Name/rename/delete

    <div class="connections-dialog__panel" role="dialog" aria-modal="true" aria-labelledby="connections-dialog-title">
        <header class="connections-dialog__header">
            <h2 id="connections-dialog-title">Multiplayer</h2>
            <button type="button" class="connections-dialog__close" id="connections-dialog-close" aria-label="Close">✕</button>

        <div class="connections-dialog__name-row">
            <label for="menu-device-name-input">Your device name</label>
            <input type="text" id="menu-device-name-input" class="connections-dialog__name-input" maxlength="60" placeholder="My device" />
            <span class="connections-dialog__name-hint">Shown to other devices when you connect</span>

<div class="connections-dialog connections-dialog--log" id="diag-log-dialog" hidden>
    <div class="connections-dialog__panel" role="dialog" aria-modal="true" aria-labelledby="diag-log-title">
        <header class="connections-dialog__header">

            <button type="button" class="connections-dialog__close" id="diag-log-close" aria-label="Close">✕</button>
        </header>
        <textarea class="diag-log__box" id="diag-log-box" readonly spellcheck="false" rows="14" wrap="soft" aria-label="Connection log"></textarea>
        <div class="diag-log__actions">
            <button type="button" class="diag-log__btn diag-log__btn--primary" id="diag-log-copy">📋 Copy to clipboard</button>

<div class="page-wrapper">

    <!-- ========== LAUNCHER HEADER ========== -->
    <header class="launcher-header">
        <h1 class="launcher-header__title">Paul's <span>Arcade</span></h1>
    </header>

    <!-- ========== GAME LAUNCHER ========== -->
    <!-- The game grid renders from /catalog.json (see the CATALOG module block
         near the bottom and arcade-catalog.js). Add games there, not here. -->
    <div id="view-launcher">
        <div class="launcher-grid" id="launcher-grid-container">
        </div>
    </div>

    <div class="launcher-toast" id="launcher-toast" role="status" aria-live="polite"></div>

    <!-- Quiet, non-blocking network-activity mark (bottom corner). Replaces the
         old interruption toast — a reconnect shows as a soft shimmer, not a banner.
         The visual mark stays aria-hidden (decorative); the sibling live region
         gives assistive tech the same signal the sighted user reads. -->
    <div class="net-watermark" id="net-watermark" aria-hidden="true">
        <span class="net-watermark__glyph">⚇</span>
        <span class="net-watermark__label" id="net-watermark-label"></span>
    </div>
    <div class="visually-hidden" id="net-activity-live" role="status" aria-live="polite"></div>

    <!-- Non-blocking confirm/prompt. window.confirm/prompt freeze the event
         loop — fired right after a P2P channel opens (naming a new connection,
         the auto-reconnect opt-in) that stalls heartbeats and the peer sees the
         fresh link flap to 'interrupted'. This modal keeps the loop running. -->
    <div id="arcade-dialog" class="arcade-dialog-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="arcade-dialog-msg">
        <div class="arcade-dialog">
            <p class="arcade-dialog__msg" id="arcade-dialog-msg"></p>
            <input type="text" class="arcade-dialog__input hidden" id="arcade-dialog-input" autocomplete="off">
            <div class="arcade-dialog__actions">
                <button type="button" class="topbar-btn arcade-dialog__btn" id="arcade-dialog-cancel">Cancel</button>
                <button type="button" class="topbar-btn arcade-dialog__btn" id="arcade-dialog-ok">OK</button>
            </div>
        </div>
    </div>

    <!-- ========== GAME VIEW ========== -->
    <div id="view-game" class="hidden">
        <div class="game-topbar">
            <h2 class="game-topbar__title" id="game-topbar-title">Paul's Arcade</h2>
            <div class="game-topbar__actions">
                <button type="button" class="topbar-btn" id="topbar-menu-toggle" data-launcher-menu-toggle aria-haspopup="true" aria-expanded="false" aria-controls="launcher-menu-panel" aria-label="Open menu" title="Menu">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                        <line x1="4" y1="7" x2="20" y2="7"/>
                        <line x1="4" y1="12" x2="20" y2="12"/>
                        <line x1="4" y1="17" x2="20" y2="17"/>
                    </svg>
                </button>

        </div>
        <div id="iframe-host"></div>
        <!-- Loading veil + error card over the game frame. Opaque frames fire a
             load event even for error pages, so we key "loaded" on the SDK's
             arcade:hello, with a timeout fallback to the error card. -->
        <div id="game-loading" class="game-overlay hidden" role="status" aria-live="polite">
            <div class="game-overlay__spinner" aria-hidden="true"></div>
            <p class="game-overlay__msg" id="game-loading-msg">Loading…</p>

                <button type="button" class="topbar-btn game-overlay__btn" id="game-error-retry">Retry</button>
                <button type="button" class="topbar-btn game-overlay__btn" id="game-error-back">Back to games</button>
            </div>
        </div>
    </div>

</div>

<script>
    // ==========================================
    // window.__arcade — the one cross-controller surface.
    // Constructed exactly once, here, with every slot listed so the shape is
    // greppable in one place. The controller IIFEs below (and the Known
    // Peers module script at the bottom of the page) fill in their slots as
    // they run; consumers null-check because some slots (p2p) stay empty
    // until the lazy bridge loads.
    // ==========================================
    window.__arcade = {
        // fontControl
        getFontScale: null,
        // catalog module block (bottom of page)
        catalog: null,
        // poolCapControl — re-clamped once the catalog renders (gameCount source)
        setGameCount: null,
        // knownPeers module (bottom of page)
        renderKnownPeers: null,
        renamePeer: null,
        // appMenu
        launcherMenu: null,
        closeLauncherMenu: null,
        // gameViewController
        viewGame: null,
        viewLauncher: null,
        // platformController
        hideGameView: null,
        applyPoolCap: null,
        showGame: null,
        openMultiplayerPanel: null,
        loadP2P: null,
        broadcastSettings: null,
        p2p: null,
        // storageHost: launcher-owned glue handed to the extracted storage
        // modules; storage: the bridge dispatch handles the router delegates to
        // (see arcade-storage-bridge.js / arcade-save.js, wired in the module
        // block after this IIFE runs — null until then, router queues meanwhile).
        storageHost: null,
        storage: null
    };

    // ==========================================
    // STARFIELD — Dense animated twinkling stars
    // ==========================================
    (function createStarfield() {
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        const container = document.getElementById('starfield');
        const count = 150;

        for (let i = 0; i < count; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            // 15% warm, 10% cool, 75% white
            const r = Math.random();
            if (r > 0.85) star.classList.add('star--warm');
            else if (r > 0.75) star.classList.add('star--cool');

            const size = Math.random() * 2.8 + 0.3;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', (Math.random() * 5 + 2) + 's');
            star.style.setProperty('--max-opacity', (Math.random() * 0.7 + 0.15).toFixed(2));
            star.style.setProperty('--drift-duration', (Math.random() * 30 + 20) + 's');
            star.style.setProperty('--drift-x', (Math.random() * 20 - 10) + 'px');
            star.style.setProperty('--drift-y', (Math.random() * 20 - 10) + 'px');
            star.style.animationDelay = (Math.random() * 6) + 's';
            container.appendChild(star);
        }
    })();

    // ==========================================
    // FONT CONTROL — Adjust root font scale

    (function fontControl() {
        const d = document.documentElement;
        const KEY = 'arcade.v1.global.fontScale';
        const LEGACY_KEY = 'fontScale';

            } catch (e) {}
        }

        const FONT_STEP = 0.25;

        function setScale(s) {
            scale = Math.max(FONT_MIN, Math.min(s, FONT_MAX));

            const dec = document.getElementById(decId);
            const inc = document.getElementById(incId);
            const res = document.getElementById(resId);
            if (dec) dec.addEventListener('click', () => setScale(scale - FONT_STEP));
            if (inc) inc.addEventListener('click', () => setScale(scale + FONT_STEP));

    // ==========================================
    // POOL CAP CONTROL — How many recent games to keep mounted
    // ==========================================
    // The user types any positive integer; we clamp to [1, gameCount] where
    // gameCount is the number of launcher buttons. A value at the cap
    // effectively means "all games" and disables eviction.
    (function poolCapControl() {
        const KEY = 'arcade.v1.global.poolCap';
        const DEFAULT = 2;
        const input = document.getElementById('menu-pool-cap-input');
        if (!input) return;

        // 1 until the catalog renders (the grid is fetch-built); the catalog
        // module calls setGameCount with the real count. read() clamps for
        // DISPLAY only — nothing writes storage until a user 'change', so a
        // stored cap larger than the pre-catalog placeholder is never lost.
        let gameCount = document.querySelectorAll('.launcher-btn[data-game-id]').length || 1;
        input.max = String(gameCount);
        input.title = `1–${gameCount}`;

        function clamp(n) {
            if (!isFinite(n)) return DEFAULT;
            return Math.max(1, Math.min(Math.floor(n), gameCount));

        function read() {
            try {
                const raw = localStorage.getItem(KEY);
                if (raw === null) return clamp(DEFAULT);
                return clamp(Number(JSON.parse(raw)));
            } catch (e) { return clamp(DEFAULT); }
        }

        function write(n) {
            const v = clamp(n);
            localStorage.setItem(KEY, JSON.stringify(v));
            input.value = String(v);

                window.__arcade.applyPoolCap();
            }

        // applying a transient typo like "1" while the user is typing "12".

            if (!isFinite(n) || n < 1) return;
            gameCount = Math.floor(n);

            input.value = String(read());
        };
    })();

        if (installBtn) {
            installBtn.addEventListener('click', async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                hideInstallUI();
                if (outcome === 'accepted') console.log('PWA installed');
            });
        }

        window.addEventListener('appinstalled', () => {
            deferredPrompt = null;
            hideInstallUI();
        });
    })();
</script>

<script type="module">
    // ==========================================
    // CATALOG — data-driven launcher grid (issue #34). catalog.json is the one
    // authoritative game list; this renders it into #launcher-grid-container.
    // Runs after the classic IIFEs built window.__arcade; click handling is
    // event delegation on the grid container, so render timing is decoupled
    // from wiring. On failure: an error card with Retry (the launcher is
    // useless without its grid — fail loudly, not blank).
    // ==========================================
    import { loadCatalog, renderLauncherGrid, renderCatalogError, gameHref } from './arcade-catalog.js';

    const gridContainer = document.getElementById('launcher-grid-container');

    // Deep links (#36): `#app=<id>` boots straight into a game. Resolved ONLY
    // through the catalog — the fragment names an id, never a URL, so nothing
    // attacker-shaped can pick the iframe src. #p2p-(offer|answer) fragments
    // own the boot fragment channel (see tryResumeOnLaunch's sibling check)
    // and the anchored regex can't match them anyway.
    function openDeepLink(games) {
        const m = /^#app=([A-Za-z0-9_-]+)$/.exec(location.hash);
        if (!m) return;
        const game = games.find((g) => g.id === decodeURIComponent(m[1]));
        if (game) {
            window.__arcade.showGame(game.id, gameHref(game), game.name);
        } else {
            if (window.__arcade.showToast) window.__arcade.showToast('That game link doesn’t match anything here.');
            try { history.replaceState(null, '', location.pathname + location.search); } catch (e) {}
        }
    }

    async function bootCatalog() {
        try {
            const games = await loadCatalog();
            renderLauncherGrid(gridContainer, games);
            if (window.__arcade.setGameCount) window.__arcade.setGameCount(games.length);
            window.__arcade.catalog = games;
            openDeepLink(games);
        } catch (e) {
            console.error('[arcade] catalog load failed', e);
            renderCatalogError(gridContainer, bootCatalog);
        }
    }
    // No top-level await: that would hold up the storage-modules block below
    // (inline modules execute in document order) for zero benefit.
    bootCatalog();
</script>

<script type="module">
    // ==========================================
    // STORAGE MODULES — wire the extracted opaque-frame storage bridge and the
    // save/import machinery to the launcher via window.__arcade.storageHost.
    // Runs after the classic script above has built storageHost; module blocks
    // execute in document order after parse, always before the load event the
    // acceptance tests wait on. Replaying the pending queue flushes any storage
    // message that raced module load (none in practice — no game auto-mounts at
    // parse time — but a dropped ls-proxy 'dump' would hang a game).
    // ==========================================
    import { initStorageBridge } from './arcade-storage-bridge.js';
    import { initSaveLoad } from './arcade-save.js';

    const storageHost = window.__arcade.storageHost;
    window.__arcade.storage = initStorageBridge(storageHost);
    initSaveLoad(storageHost);
    storageHost.replayPendingStorageMessages();
</script>

<script type="module">
    // ==========================================
    // MULTIPLAYER DIALOG — the single Network menu item. Device name, "New
    // connection", and the full saved-connections manager (rename, delete,
    // call/hang up, start over) all live behind one "Multiplayer" button so
    // the menu itself stays uncluttered. Call/Hang Up frame a saved
    // connection like a phone call: live means Hang Up ends it (keeping the
    // pairing to call back later), not-live means Call tries to silently
    // bring it back. A module so the CRUD comes from arcade-known-peers.js —
    // the single owner of arcade.v1._meta.knownPeers, shared with the lazy
    // P2P bridge (which records NEW entries on every identity handshake and
    // pushes a live refresh here via ArcadeP2P.onPeerIdentity, wired in the
    // platformController's loadP2P()). Device name / rename / delete render
    // instantly from localStorage; live status and call/hang-up/start-over
    // force-load the bridge on open — opening this dialog is a deliberate
    // touch, not something that happens on menu open.
    // ==========================================
    import { readKnownPeers, renameKnownPeer, deleteKnownPeer } from './arcade-known-peers.js';
    import { ArcadeDiag } from './arcade-diag.js';

    (function connectionsDialogController() {
        const DEVICE_NAME_KEY = 'arcade.v1._meta.deviceName';

        const nameInput = document.getElementById('menu-device-name-input');
        const menuBtn = document.getElementById('menu-multiplayer');
        const dialog = document.getElementById('connections-dialog');
        const dialogPanel = dialog && dialog.querySelector('.connections-dialog__panel');
        const dialogClose = document.getElementById('connections-dialog-close');
        const dialogNew = document.getElementById('connections-dialog-new');
        const listHeading = document.getElementById('connections-dialog-list-heading');
        const list = document.getElementById('connections-dialog-list');
        if (!nameInput || !menuBtn || !dialog || !list) return;

        let unsubStatus = null;

        function toast(msg, opts) {
            if (window.__arcade.showToast) window.__arcade.showToast(msg, opts);
        }

        // Roster entries carry the stored name — after any knownPeers write
        // this panel makes, tell the bridge (if loaded) so subscribed games
        // see the change live. The bridge can't observe the storage write.
        function refreshBridgeRoster() {
            if (window.__arcade.p2p) window.__arcade.p2p.refreshRoster();
        }

        function renamePeer(id, name) {
            const ok = renameKnownPeer(id, name);
            if (ok) {
                render();
                refreshBridgeRoster();
            }
            return ok;
        }
        function relativeTime(iso) {
            const then = Date.parse(iso);
            if (!isFinite(then)) return 'a while ago';
            const mins = Math.round((Date.now() - then) / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return mins + 'm ago';
            const hours = Math.round(mins / 60);
            if (hours < 24) return hours + 'h ago';
            return Math.round(hours / 24) + 'd ago';
        }

        // Bridge may not be loaded yet — in that case nothing could possibly
        // be live, so fall back to the stored `paused` display flag.
        function connState(id, peer) {
            return window.__arcade.p2p ? window.__arcade.p2p.connectionState(id)
                : (peer.paused ? 'paused' : 'idle');
        }
        const STATUS_LABEL = {
            connected: ['🟢 Connected', 'live'],
            interrupted: ['🟡 Reconnecting…', 'pending'],
            connecting: ['🟡 Connecting…', 'pending'],
            paused: ['📵 Hung up', 'paused'],
            idle: ['', '']
        };

        function buildRow(id, peer) {
            const displayName = peer.name || 'Unnamed device';
            const state = connState(id, peer);
            const isLive = state === 'connected' || state === 'interrupted' || state === 'connecting';

            const row = document.createElement('div');
            row.className = 'connections-row';

            const top = document.createElement('div');
            top.className = 'connections-row__top';
            const nameEl = document.createElement('span');
            nameEl.className = 'connections-row__name';
            nameEl.textContent = displayName;
            top.appendChild(nameEl);
            const [label, cls] = STATUS_LABEL[state] || STATUS_LABEL.idle;
            if (label) {
                const statusEl = document.createElement('span');
                statusEl.className = 'connections-row__status connections-row__status--' + cls;
                statusEl.textContent = label;
                top.appendChild(statusEl);
            }
            row.appendChild(top);

            const meta = document.createElement('div');
            meta.className = 'connections-row__meta';
            meta.textContent = 'Last connected ' + relativeTime(peer.lastConnectedAt)
                + (state === 'idle' && peer.autoReconnect ? ' · listening — Call reaches them while their arcade is open' : '');
            row.appendChild(meta);

            const actions = document.createElement('div');
            actions.className = 'connections-row__actions';

            if (isLive) {
                const hangUpBtn = document.createElement('button');
                hangUpBtn.type = 'button';
                hangUpBtn.className = 'connections-row__btn';
                hangUpBtn.textContent = '☎️ Hang Up';
                hangUpBtn.title = 'Hang up now — stays in your list so you can call back later';
                hangUpBtn.addEventListener('click', async () => {
                    hangUpBtn.disabled = true;
                    try {
                        const b = await window.__arcade.loadP2P();
                        await b.hangUpKnownPeer(id);
                        toast('Hung up on ' + displayName + '.');
                    } catch (e) {} finally { render(); }
                });
                actions.appendChild(hangUpBtn);
            } else {
                if (peer.autoReconnect) {
                    const callBtn = document.createElement('button');
                    callBtn.type = 'button';
                    callBtn.className = 'connections-row__btn';
                    callBtn.textContent = '📞 Call';
                    callBtn.title = 'Call back — tries to reconnect automatically if their device is online too';
                    callBtn.addEventListener('click', async () => {
                        callBtn.disabled = true;
                        try {
                            const b = await window.__arcade.loadP2P();
                            const tried = await b.callKnownPeer(id);
                            toast(tried
                                ? 'Calling ' + displayName + '…'
                                : 'No saved pairing to call ' + displayName + ' — use "New invite code" to reconnect.');
                        } catch (e) {} finally { render(); }
                    });
                    actions.appendChild(callBtn);
                }

                const reconnectBtn = document.createElement('button');
                reconnectBtn.type = 'button';
                reconnectBtn.className = 'connections-row__btn';
                reconnectBtn.textContent = '🔗 New invite code';
                reconnectBtn.title = 'Get a fresh invite code to show or send';
                reconnectBtn.addEventListener('click', () => {
                    // One-tap reconnect: skip the Host/Join choice and put a
                    // fresh invite code on screen immediately. The other
                    // device joins by scanning it or tapping the sent link.
                    if (window.__arcade.openMultiplayerPanel) window.__arcade.openMultiplayerPanel({ mode: 'host' });
                });
                actions.appendChild(reconnectBtn);
            }

            const icons = document.createElement('div');
            icons.className = 'connections-row__icon-group';

            const autoBtn = document.createElement('button');
            autoBtn.type = 'button';
            autoBtn.className = 'connections-row__icon-btn';
            const autoOn = peer.autoReconnect === true;
            autoBtn.textContent = autoOn ? '🔁' : '🚫';
            autoBtn.title = autoOn
                ? 'Auto-reconnect is ON — tap to turn off'
                : 'Auto-reconnect is OFF — tap to turn on (takes effect next time you connect)';
            autoBtn.setAttribute('aria-label', (autoOn ? 'Disable' : 'Enable') + ' auto-reconnect for ' + displayName);
            autoBtn.addEventListener('click', () => {
                if (!window.__arcade.loadP2P) return;
                window.__arcade.loadP2P()
                    .then((b) => autoOn ? b.disableAutoReconnect(id) : b.enableAutoReconnect(id))
                    .then((attempted) => {
                        // Turning it back on re-arms any existing pairing and
                        // tries a silent reconnect if this peer isn't live —
                        // give the same honest feedback Call does: only
                        // claim an attempt when one actually happened.
                        if (autoOn || isLive) return;
                        toast(attempted
                            ? 'Calling ' + displayName + '…'
                            : 'Auto-reconnect will apply next time you connect to ' + displayName + '.');
                    })
                    .then(() => render()).catch(() => {});
            });
            icons.appendChild(autoBtn);

            const renameBtn = document.createElement('button');
            renameBtn.type = 'button';
            renameBtn.className = 'connections-row__icon-btn';
            renameBtn.title = 'Rename';
            renameBtn.setAttribute('aria-label', 'Rename ' + displayName);
            renameBtn.textContent = '✎';
            renameBtn.addEventListener('click', () => {
                const next = window.prompt('Rename this connection:', displayName);
                if (next === null) return;
                renamePeer(id, next);
            });
            icons.appendChild(renameBtn);

            const startOverBtn = document.createElement('button');
            startOverBtn.type = 'button';
            startOverBtn.className = 'connections-row__icon-btn';
            startOverBtn.title = 'Start over — forget this connection\'s session and auto-reconnect pairing (keeps the name)';
            startOverBtn.setAttribute('aria-label', 'Start over with ' + displayName);
            startOverBtn.textContent = '↺';
            startOverBtn.addEventListener('click', async () => {
                if (!window.confirm('Start over with "' + displayName + '"?\n\n' +
                    'This drops the current connection and forgets its auto-reconnect pairing — ' +
                    'you\'ll need a fresh invite code next time. The saved name stays.')) return;
                try {
                    const b = await window.__arcade.loadP2P();
                    await b.startOverKnownPeer(id);
                    toast('Reset connection to ' + displayName + '.');
                } catch (e) {} finally { render(); }
            });
            icons.appendChild(startOverBtn);

            const deleteBtn = document.createElement('button');
            deleteBtn.type = 'button';
            deleteBtn.className = 'connections-row__icon-btn';
            deleteBtn.title = 'Delete';
            deleteBtn.setAttribute('aria-label', 'Delete ' + displayName);
            deleteBtn.textContent = '✕';
            deleteBtn.addEventListener('click', () => {
                if (!window.confirm('Forget "' + displayName + '"?')) return;
                deleteKnownPeer(id);
                render();
                refreshBridgeRoster();
            });
            icons.appendChild(deleteBtn);

            actions.appendChild(icons);
            row.appendChild(actions);
            return row;
        }

        function render() {
            const known = readKnownPeers();
            const ids = Object.keys(known).sort((a, b) =>
                Date.parse(known[b].lastConnectedAt || 0) - Date.parse(known[a].lastConnectedAt || 0));

            if (listHeading) listHeading.hidden = ids.length === 0;

            list.innerHTML = '';
            if (ids.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'connections-dialog__empty';
                empty.textContent = 'Connect to a device to remember it here.';
                list.appendChild(empty);
                return;
            }
            for (const id of ids) list.appendChild(buildRow(id, known[id]));
        }

        function openDialog() {
            if (window.__arcade.closeLauncherMenu) window.__arcade.closeLauncherMenu();
            dialog.hidden = false;
            render();
            // Live status needs the bridge — load it the same way "Multiplayer"
            // does, then keep the list live for as long as the dialog is open.
            if (window.__arcade.loadP2P) {
                window.__arcade.loadP2P().then((b) => {
                    if (dialog.hidden) return; // closed before it finished loading
                    render();
                    if (!unsubStatus) unsubStatus = b.onStatus(() => render());
                }).catch(() => {});
            }
            setTimeout(() => {
                const focusable = dialog.querySelectorAll('button, input');
                if (focusable.length) focusable[0].focus();
            }, 50);
        }
        function closeDialog() {
            dialog.hidden = true;
            if (unsubStatus) { unsubStatus(); unsubStatus = null; }
            closeLogDialog(); // never leave the log overlay orphaned on top
        }
        window.__arcade.closeConnectionsDialog = closeDialog;

        // ---- connection log dialog (read-only; never starts a connection) ----
        const logDialog = document.getElementById('diag-log-dialog');
        const logOpen = document.getElementById('connections-dialog-log-open');
        const logClose = document.getElementById('diag-log-close');
        const logBox = document.getElementById('diag-log-box');
        const logCopy = document.getElementById('diag-log-copy');
        const logShare = document.getElementById('diag-log-share');
        let unsubLog = null;

        function renderLogText() {
            const all = ArcadeDiag.entries();
            logBox.value = all.length
                ? all.map((entry) => ArcadeDiag.format(entry)).join('\n')
                : 'Nothing yet this session — connection activity will appear here.';
            logBox.scrollTop = logBox.scrollHeight;
        }
        function openLogDialog() {
            logDialog.hidden = false;
            renderLogText();
            if (!unsubLog) unsubLog = ArcadeDiag.onEntry(() => renderLogText());
            setTimeout(() => { if (logClose) logClose.focus(); }, 50);
        }
        function closeLogDialog() {
            if (logDialog) logDialog.hidden = true;
            if (unsubLog) { unsubLog(); unsubLog = null; }
        }
        // Clipboard first; iOS/WebViews sometimes deny it, so fall back to a
        // selected textarea + execCommand, then to a prompt as a last resort.
        async function copyTranscript() {
            const transcript = ArcadeDiag.transcript();
            try {
                await navigator.clipboard.writeText(transcript);
                toast('Connection log copied.');
                return;
            } catch (e) {}
            try {
                const ta = document.createElement('textarea');
                ta.value = transcript;
                ta.setAttribute('readonly', '');
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.focus();
                ta.select();
                const ok = document.execCommand('copy');
                ta.remove();
                if (ok) { toast('Connection log copied.'); return; }
            } catch (e) {}
            window.prompt('Copy connection log:', transcript);
        }
        if (logDialog && logOpen && logClose && logBox && logCopy) {
            logOpen.addEventListener('click', openLogDialog);
            logClose.addEventListener('click', closeLogDialog);
            logDialog.addEventListener('click', (e) => { if (e.target === logDialog) closeLogDialog(); });
            logCopy.addEventListener('click', copyTranscript);
            if (logShare && navigator.share) {
                logShare.hidden = false;
                logShare.addEventListener('click', async () => {
                    try {
                        await navigator.share({ title: 'Arcade connection log', text: ArcadeDiag.transcript() });
                    } catch (e) {} // user cancelled the sheet — not an error
                });
            }
        }

        menuBtn.addEventListener('click', openDialog);
        dialogClose.addEventListener('click', closeDialog);
        dialog.addEventListener('click', (e) => { if (e.target === dialog) closeDialog(); });
        dialogNew.addEventListener('click', () => {
            closeDialog();
            if (window.__arcade.openMultiplayerPanel) window.__arcade.openMultiplayerPanel();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key !== 'Escape') return;
            // Innermost overlay first: the log sits on top of the dialog.
            if (logDialog && !logDialog.hidden) closeLogDialog();
            else if (!dialog.hidden) closeDialog();
        });
        if (dialogPanel) {
            dialogPanel.addEventListener('keydown', (e) => {
                if (e.key !== 'Tab') return;
                const focusable = Array.from(dialogPanel.querySelectorAll('button, input, [tabindex]:not([tabindex="-1"])'))
                    .filter((el) => el.offsetWidth > 0 || el.offsetHeight > 0);
                if (!focusable.length) return;
                const first = focusable[0], last = focusable[focusable.length - 1];
                if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
                else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
            });
        }

        try { nameInput.value = localStorage.getItem(DEVICE_NAME_KEY) || ''; } catch (e) {}
        nameInput.addEventListener('change', () => {
            const trimmed = nameInput.value.trim().slice(0, 60);
            try {
                if (trimmed) localStorage.setItem(DEVICE_NAME_KEY, trimmed);
                else localStorage.removeItem(DEVICE_NAME_KEY);
            } catch (e) {}
            nameInput.value = trimmed;
        });
        nameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); nameInput.blur(); }
        });

        render();
        window.__arcade.renderKnownPeers = render; // live-refresh hook for the P2P bridge
        window.__arcade.renamePeer = renamePeer;    // used to accept/edit a new-connection's suggested name
    })();
</script>

</body>
