<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>P2P Test Game</title>
</head>
<body>
<h1>P2P Test Game</h1>
<p id="status">peer: unknown</p>
<pre id="log"></pre>

<!-- The whole point of this fixture: a game that knows NOTHING about WebRTC,
     QR codes, or signaling. It talks only to the Arcade SDK. If this game
     can exchange messages across two devices, the framework owns the
     connection end to end. -->
<script src="/arcade-sdk.js"></script>
<script>
    Arcade.init({ gameId: 'p2p-test-game' });

    window.__got = [];                       // received payloads (assertable)
    window.__statuses = [Arcade.peer.status()];

    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');

    function render(s) {
        statusEl.textContent = 'peer: ' + s;
    }
    Arcade.ready.then(() => render(Arcade.peer.status()));

    Arcade.peer.onStatus((s) => {
        window.__statuses.push(s);
        render(s);
    });

    // __got (payloads, asserted by the two-launcher acceptance) and __rx
    // (full delivery record for the multiseat acceptance) are maintained by
    // ONE listener so the two logs can never disagree about a delivery.
    window.__rx = [];
    Arcade.peer.onMessage((payload, fromPeer, meta) => {
        window.__got.push(payload);
        window.__rx.push({ payload, fromPeer, meta });
        logEl.textContent += 'recv: ' + JSON.stringify(payload) + '\n';
    });

    // Roster events — one full-roster array per change (multiseat tests).
    window.__rosterEvents = [];
    Arcade.peer.onPeersChange((peers) => window.__rosterEvents.push(peers));

    // Test hooks
    window.__send = (payload) => Arcade.peer.send(payload);
    window.__sendTo = (payload, to) => Arcade.peer.send(payload, { to });
    window.__peerStatus = () => Arcade.peer.status();
    window.__caps = () => Arcade.peer.caps();
    window.__peers = () => Arcade.peer.peers();
</script>
</body>
</html>
