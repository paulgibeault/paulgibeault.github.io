name: CI & Deploy Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Gate: a broken PR fails here and never deploys. Runs on PRs and on push.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Syntax-check core JS
        run: |
          set -e
          for f in arcade-sdk.js arcade-p2p.js arcade-known-peers.js arcade-diag.js \
                   p2p/*.js tools/*.mjs; do
            echo "checking $f"
            node --check "$f"
          done

      - name: Install deps + browser
        run: |
          npm install
          npx playwright install --with-deps chrome

      - name: P2P acceptance (real WebRTC, self-contained)
        # Real-WebRTC negotiation is timing-sensitive under headless CI; retry a
        # few times so a transient hiccup doesn't block the deploy. A genuine
        # regression fails all attempts.
        run: |
          for i in 1 2 3; do
            echo "::group::p2p-acceptance attempt $i"
            if node tools/p2p-acceptance.mjs; then echo "::endgroup::"; exit 0; fi
            echo "::endgroup::"
            echo "attempt $i failed; retrying in 3s"
            sleep 3
          done
          echo "p2p-acceptance failed after 3 attempts"
          exit 1

      # NOTE: the full per-game §13 acceptance (tools/acceptance.mjs) and the
      # --pool test need a launcher staged with catalog-registered games, which
      # a bare checkout doesn't have. Wire them in here once a committed
      # acceptance fixture is registered in the catalog (tracked in issue #40 /
      # the starter-template work). Run locally meanwhile:
      #   ./dev.sh ../si-syn ../hecknsic ../pi-game
      #   npm run acceptance -- http://127.0.0.1:4791/si-syn/
      #   npm run acceptance -- --pool http://127.0.0.1:4791/

  deploy:
    needs: test
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
